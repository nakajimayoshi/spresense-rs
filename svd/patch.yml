          XOSC:
            description: "Crystal oscillator powered on"
            bitOffset: 1
            bitWidth: 1
          SYSPLL:
            description: "System PLL powered on"
            bitOffset: 2
            bitWidth: 1
          RF_LNA:
            description: "RF LNA powered on"
            bitOffset: 4
            bitWidth: 1
          RF_MIX:
            description: "RF mixer powered on"
            bitOffset: 5
            bitWidth: 1
          RF_IF:
            description: "RF IF block powered on"
            bitOffset: 6
            bitWidth: 1
          RF_ADC:
            description: "RF ADC powered on"
            bitOffset: 7
            bitWidth: 1
          RF_LO:
            description: "RF LO powered on"
            bitOffset: 8
            bitWidth: 1
          RF_PLL:
            description: "RF PLL powered on"
            bitOffset: 9
            bitWidth: 1
          HPADC:
            description: "High-precision ADC powered on"
            bitOffset: 12
            bitWidth: 1
          LPADC:
            description: "Low-power ADC powered on"
            bitOffset: 13
            bitWidth: 1
      CLSELDIV_WAKE:
        description: "Clock select/divider setting used on wake from sleep"
        addressOffset: 0x414
        access: read-write
        resetValue: 0x00000000
      CKDIV_CPU_DSP_BUS_WAKE:
        description: "CPU/DSP/bus clock divider used on wake from sleep"
        addressOffset: 0x418
        access: read-write
        resetValue: 0x00000000
      CKSEL_ROOT_WAKE:
        description: "Root clock source select used on wake from sleep"
        addressOffset: 0x41c
        access: read-write
        resetValue: 0x00000000
      PMU_CORE_CKEN:
        description: "PMU core clock enable"
        addressOffset: 0x4c0
        access: read-write
        resetValue: 0x00000000
      CKSEL_ROOT:
        description: "Root clock source select and RTC status"
        addressOffset: 0x4c4
        access: read-write
        resetValue: 0x00000000
