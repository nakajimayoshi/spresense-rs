          PDN:
            description: "Pulldown: 0=pulldown enabled, 1=normal (off)"
            bitOffset: 16
            bitWidth: 1
          PUN:
            description: "Pullup: 0=pullup enabled, 1=normal (off)"
            bitOffset: 8
            bitWidth: 1
          ENZI:
            description: "Input enable: 0=disabled, 1=enabled"
            bitOffset: 0
            bitWidth: 1

      # IOCELL mode-mux for the APP-domain (IMG) pins.
      # Group UART2 [3:2] controls the UART2_TXD/RXD pins; mode 1 = UART2.
      # CXD56_TOPREG_IOCAPP_IOMD = CXD56_TOPREG_BASE + 0x14a0.
      # SDK: cxd56_pinconfig.c:76,275; GROUP_UART2=2.
      IOCAPP_IOMD:
        description: "APP-domain IO-cell mode-mux register"
        addressOffset: 0x14a0
        access: read-write
        resetValue: 0x00000000
        fields:
          UART2:
            description: "Mode select for UART2 TXD/RXD pins (UART2 = Func1)"
            bitOffset: 2
