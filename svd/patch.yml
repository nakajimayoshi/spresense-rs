  # TOPREG_SUB: APP / GNSS sub-domain clock controller.
  # Base: CXD56_SYS_MIRROR(0x04000000) + 0x00103000 = 0x04103000.
  # Source: nuttx/arch/arm/src/cxd56xx/hardware/cxd5602_topreg.h
  TOPREG_SUB:
    description: "APP / GNSS sub-domain clock and reset controller"
    baseAddress: 0x04103000
    addressBlock:
      offset: 0x0
      size: 0x1500
      usage: "registers"
    registers:
      SWRESET_GNSDSP:
        description: "GNSS DSP software reset"
        addressOffset: 0x404
        access: read-write
        resetValue: 0x00000000
      SWRESET_APP:
        description: "Application domain software reset"
        addressOffset: 0x408
        access: read-write
        resetValue: 0x00000000
      SYSCPU_CKEN:
        description: "System CPU clock enable"
        addressOffset: 0x410
        access: read-write
        resetValue: 0x00000000
      APP_CKEN:
        description: "Application domain clock enables"
        addressOffset: 0x414
        access: read-write
        resetValue: 0x00000000
        fields:
          APP_CPU:
            description: "APP CPU clock enable"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Disabled
                description: ""
                value: 0
              - name: Enabled
                description: ""
                value: 1
          APP_MCLK:
            description: "APP MCLK enable"
            bitOffset: 1
            bitWidth: 1
            enumeratedValues:
              - name: Disabled
                description: ""
                value: 0
              - name: Enabled
                description: ""
                value: 1
          APP_AHB:
            description: "APP AHB clock enable"
            bitOffset: 3
            bitWidth: 1
            enumeratedValues:
              - name: Disabled
                description: ""
                value: 0
              - name: Enabled
                description: ""
                value: 1
      APP_CKSEL:
        description: "Application domain clock source select"
        addressOffset: 0x418
        access: read-write
        resetValue: 0x00000000
        fields:
          AUD_MCLK:
            description: "Audio MCLK source select"
            bitOffset: 16
            bitWidth: 2
            enumeratedValues:
              - name: Ext
                description: "External XTAL"
                value: 0
