_svd: "./cxd5602.svd"

CPU_FIFO:
  FIF_PUSH_CMP:
    PUSH_CMP:
      _replace_enum:
        "dont care": [0, ""]
        "complete": [1, ""]
  FIF_PULL_CMP:
    PULL_CMP:
      _replace_enum:
        "dont care": [0, ""]
        "complete": [1, ""]

ROT:
  CONV_CTRL:
    CONV_CALC_SEL:
      _replace_enum:
        FROM16TO240RANGE: [0, "16 .. 240 range"]
        FROM-127TO127RANGE: [1, "-127 .. 127 range"]

