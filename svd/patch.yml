      RTC0_CTL:
        description: "RTC0 control"
        addressOffset: 0x730
        access: read-write
        resetValue: 0x00000000

      # PMU kick register. Write 1 to POWER_CTRL_ON to initiate a power-state
      # transition; poll PWD_STAT / ANA_PW_STAT to confirm completion.
      # CXD56_TOPREG_PMU_PW_CTL = CXD56_TOPREG_BASE + 0x0030.
      # Manual: write-only, bit[0]=POWER_CTRL_ON, bits[31:1] reserved.
      # SDK: cxd56_clock.c:261 "putreg32(1, CXD56_TOPREG_PMU_PW_CTL)".
      PMU_PW_CTL:
        description: "PMU power-supply control request (write-only kick register)"
        addressOffset: 0x030
        access: write-only
        resetValue: 0x00000000
        fields:
          POWER_CTRL_ON:
            description: "Write 1 to request a PMU power-state transition"
            bitOffset: 0
            bitWidth: 1

      # GPIO interrupt slot mux — SYS domain (SYSIOP pins, slots 0–5 → EXDEVICE_0..5).
      # Each byte holds a pin index (0–63); value 0x3f = "unused" sentinel (INTSEL_DEFAULT_VAL).
      # Byte offset within the register = local slot index (0–5 for SYS domain).
      # Source: cxd56_gpioint.c alloc_slot(); CXD56_TOPREG_IOCSYS_INTSEL0/1 = BASE+0x7b0/0x7b4.
      IOCSYS_INTSEL0:
        description: "SYS-domain GPIO interrupt slot mux, slots 0–3 (1 byte per slot, pin index 0–63)"
        addressOffset: 0x7b0
        access: read-write
        resetValue: 0x3f3f3f3f
        fields:
          SLOT0:
            description: "Pin index for SYS slot 0 → EXDEVICE_0 (0x3f = unused)"
            bitOffset: 0
            bitWidth: 6
          SLOT1:
            description: "Pin index for SYS slot 1 → EXDEVICE_1 (0x3f = unused)"
            bitOffset: 8
            bitWidth: 6
          SLOT2:
            description: "Pin index for SYS slot 2 → EXDEVICE_2 (0x3f = unused)"
            bitOffset: 16
            bitWidth: 6
          SLOT3:
            description: "Pin index for SYS slot 3 → EXDEVICE_3 (0x3f = unused)"
            bitOffset: 24
            bitWidth: 6
      IOCSYS_INTSEL1:
        description: "SYS-domain GPIO interrupt slot mux, slots 4–5"
        addressOffset: 0x7b4
        access: read-write
        resetValue: 0x00003f3f
        fields:
          SLOT4:
            description: "Pin index for SYS slot 4 → EXDEVICE_4 (0x3f = unused)"
            bitOffset: 0
            bitWidth: 6
          SLOT5:
            description: "Pin index for SYS slot 5 → EXDEVICE_5 (0x3f = unused)"
            bitOffset: 8
            bitWidth: 6

      # IOCELL mode-mux for the SYSIOP (COM-bus) pins.
      # Bits [1:0] per group = mode (0=GPIO, 1=Func1, 2=Func2, 3=Func3).
      # Group SPI0A [13:12] controls SPI0_CS_X and SPI0_SCK; mode 1 = UART1.
      # CXD56_TOPREG_IOCSYS_IOMD0 = CXD56_TOPREG_BASE + 0x07c0.
      # SDK: cxd56_pinconfig.c:53,141,172; GROUP_SPI0A=12.
      IOCSYS_IOMD0:
        description: "SYSIOP IO-cell mode-mux register 0"
        addressOffset: 0x7c0
        access: read-write
        resetValue: 0x00000000
        fields:
          SPI0A:
            description: "Mode select for SPI0_CS_X / SPI0_SCK (UART1 = Func1)"
            bitOffset: 12
            bitWidth: 2
            enumeratedValues:
              - name: Gpio
                description: "GPIO mode"
                value: 0
              - name: Func1
                description: "Function 1 (UART1 on SPI0A pins)"
                value: 1
              - name: Func2
                description: "Function 2"
                value: 2
              - name: Func3
                description: "Function 3"
                value: 3

      # IOCELL mode-mux for the SYSIOP I2C0 (sensor bus) pins.
      # Bits [19:18] = mode for I2C0_BCK / I2C0_BDT; mode 1 = I2C0 function.
      # CXD56_TOPREG_IOCSYS_IOMD1 = CXD56_TOPREG_BASE + 0x07c4.
      # User manual §3.1.4; GROUP_I2C0 = bit offset 18.
      IOCSYS_IOMD1:
        description: "SYSIOP IO-cell mode-mux register 1"
        addressOffset: 0x7c4
        access: read-write
        resetValue: 0x00000000
        fields:
          I2C0:
            description: "Mode select for I2C0_BCK / I2C0_BDT (I2C0 = Func1)"
            bitOffset: 18
            bitWidth: 2
            enumeratedValues:
              - name: Gpio
                description: "GPIO mode"
                value: 0
              - name: Func1
                description: "Function 1 (I2C0)"
                value: 1
              - name: Func2
                description: "Function 2"
                value: 2
              - name: Func3
                description: "Function 3"
                value: 3
          SEN_IRQ_IN:
            description: "Mode select for SEN_IRQ_IN pin (SEN_IRQ_IN = Func1)"
            bitOffset: 8
            bitWidth: 2
            enumeratedValues:
              - name: Gpio
                description: "GPIO mode"
                value: 0
              - name: Func1
                description: "Function 1 (SEN_IRQ_IN)"
                value: 1
              - name: Func2
                description: "Function 2"
                value: 2
              - name: Func3
                description: "Function 3"
                value: 3

      # IOCELL pin register for SPI0_CS_X (UART1 TXD when SPI0A=Func1).
      # CXD56_TOPREG_IO_SPI0_CS_X = CXD56_TOPREG_BASE + 0x0844.
      # Fields from user manual §I/O-Config Table I/O Configuration-9
      # (manual lines 3490-3502): LOWEMI[24], PDN[16], PUN[8], ENZI[0].
      # Reset value 0x01010100 = LOWEMI=1(2mA), PDN=1(normal), PUN=1(normal),
      # ENZI=0(input disabled).
      IO_SPI0_CS_X:
        description: "IOCELL control for SPI0_CS_X / UART1-TXD"
        addressOffset: 0x844
        access: read-write
        resetValue: 0x01010100
        fields:
          LOWEMI:
            description: "Output current: 0=4mA(max 64MHz), 1=2mA(max 32MHz)"
            bitOffset: 24
            bitWidth: 1
          PDN:
            description: "Pulldown: 0=pulldown enabled, 1=normal (off)"
            bitOffset: 16
            bitWidth: 1
          PUN:
            description: "Pullup: 0=pullup enabled, 1=normal (off)"
            bitOffset: 8
            bitWidth: 1
          ENZI:
            description: "Input enable: 0=disabled, 1=enabled"
            bitOffset: 0
            bitWidth: 1

      # IOCELL pin register for SPI0_SCK (UART1 RXD when SPI0A=Func1).
      # CXD56_TOPREG_IO_SPI0_SCK = CXD56_TOPREG_BASE + 0x0848.
      # Same field layout as IO_SPI0_CS_X; reset 0x01010100.
      IO_SPI0_SCK:
        description: "IOCELL control for SPI0_SCK / UART1-RXD"
        addressOffset: 0x848
        access: read-write
        resetValue: 0x01010100
        fields:
          LOWEMI:
            description: "Output current: 0=4mA(max 64MHz), 1=2mA(max 32MHz)"
            bitOffset: 24
            bitWidth: 1
          PDN:
            description: "Pulldown: 0=pulldown enabled, 1=normal (off)"
            bitOffset: 16
            bitWidth: 1
          PUN:
            description: "Pullup: 0=pullup enabled, 1=normal (off)"
            bitOffset: 8
            bitWidth: 1
          ENZI:
            description: "Input enable: 0=disabled, 1=enabled"
            bitOffset: 0
            bitWidth: 1

      # IOCELL pin register for the audio MCLK pad (PIN_MCLK, master-clock input
      # from the CXD5247). CXD56_TOPREG_IO_MCLK = CXD56_TOPREG_BASE + 0x0994.
      # Same field layout as the other IOCELL pads. board_audio_initialize's
      # PINCONFS_MCLK programs 2mA / float / input-enabled.
      IO_MCLK:
        description: "IOCELL control for the audio MCLK pad"
        addressOffset: 0x994
        access: read-write
        resetValue: 0x01010100
        fields:
          LOWEMI:
            description: "Output current: 0=4mA(max 64MHz), 1=2mA(max 32MHz)"
            bitOffset: 24
            bitWidth: 1
          PDN:
            description: "Pulldown: 0=pulldown enabled, 1=normal (off)"
            bitOffset: 16
            bitWidth: 1
          PUN:
            description: "Pullup: 0=pullup enabled, 1=normal (off)"
            bitOffset: 8
            bitWidth: 1
          ENZI:
            description: "Input enable: 0=disabled, 1=enabled"
            bitOffset: 0
            bitWidth: 1

      # IOCELL pin register for I2C0_BCK (I2C0 clock pad, sensor bus).
      # CXD56_TOPREG_IO_I2C0_BCK = CXD56_TOPREG_BASE + 0x08b0.
      # Reset 0x01010100 = LOWEMI=1(2mA), PDN=1(normal), PUN=1(normal), ENZI=0(disabled).
      # User manual §3.1.4 Table I/O Configuration.
      IO_I2C0_BCK:
        description: "IOCELL control for I2C0_BCK pad"
        addressOffset: 0x8b0
        access: read-write
        resetValue: 0x01010100
        fields:
          LOWEMI:
            description: "Output current: 0=4mA(max 64MHz), 1=2mA(max 32MHz)"
            bitOffset: 24
            bitWidth: 1
          PDN:
            description: "Pulldown: 0=pulldown enabled, 1=normal (off)"
            bitOffset: 16
            bitWidth: 1
          PUN:
            description: "Pullup: 0=pullup enabled, 1=normal (off)"
            bitOffset: 8
            bitWidth: 1
          ENZI:
            description: "Input enable: 0=disabled, 1=enabled"
            bitOffset: 0
            bitWidth: 1

      # IOCELL pin register for I2C0_BDT (I2C0 data pad, sensor bus).
      # CXD56_TOPREG_IO_I2C0_BDT = CXD56_TOPREG_BASE + 0x08b4.
      # Same field layout as IO_I2C0_BCK; reset 0x01010100.
      IO_I2C0_BDT:
        description: "IOCELL control for I2C0_BDT pad"
        addressOffset: 0x8b4
        access: read-write
        resetValue: 0x01010100
        fields:
          LOWEMI:
            description: "Output current: 0=4mA(max 64MHz), 1=2mA(max 32MHz)"
            bitOffset: 24
            bitWidth: 1
          PDN:
            description: "Pulldown: 0=pulldown enabled, 1=normal (off)"
            bitOffset: 16
            bitWidth: 1
          PUN:
            description: "Pullup: 0=pullup enabled, 1=normal (off)"
            bitOffset: 8
            bitWidth: 1
          ENZI:
            description: "Input enable: 0=disabled, 1=enabled"
            bitOffset: 0
            bitWidth: 1

      # IOCELL pin register for I2C4_BCK (I2C4 clock pad, main-board D14 group).
      # CXD56_TOPREG_IO_I2C4_BCK = CXD56_TOPREG_BASE + 0x0804.
      # Same field layout as IO_I2C0_BCK; reset 0x01010100.
      IO_I2C4_BCK:
        description: "IOCELL control for I2C4_BCK pad"
        addressOffset: 0x804
        access: read-write
        resetValue: 0x01010100
        fields:
