                description: "Function 2"
                value: 2
              - name: Func3
                description: "Function 3"
                value: 3

      # GP_* GPIO data registers — TOPREG_BASE + 0x2000+.
      # SDK: cxd5602_topreg.h lines 276, 352-355.
