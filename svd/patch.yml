  # SCU_ADCIF: ADC Interface — LPADC/HPADC control registers plus CPU-readable
  # per-channel FIFO Read Ports. The FIFO Read Ports are the blob-free sample
  # path: reading LPADC_FIFO(n) pops one MSB-aligned 16-bit sample from the
  # hardware FIFO of LPADC channel n WITHOUT involving the iSoP sequencer.
  #
  # UM §3.21.12.1: "Offset: 0x0018dc00 (Mirror: 0x0418dc00)"
  # UM §3.9.9.4.3: "When reading out data from the ADC, the resources of the
  #   sequencers are not used."
  # Source: cxd56_adc.h, cxd56_adc.c, hardware/cxd5602_memorymap.h:82
  SCU_ADCIF:
    description: "SCU ADC Interface — LPADC/HPADC control and per-channel FIFO
                  read ports. CPU APB read of LPADC_FIFO(n) dequeues one sample
                  from the hardware FIFO of LPADC channel n (no iSoP needed).
                  UM §3.21.12.1; Mirror base 0x0418DC00."
    baseAddress: 0x0418DC00
    addressBlock:
      offset: 0x0
      size: 0x400
      usage: "registers"
    registers:
      # -----------------------------------------------------------------------
      # LPADC per-channel FIFO Read Ports (CPU APB read = pop one sample).
      # ch0=+0x000, ch1=+0x004, ch2=+0x008 (SEN_AIN4/A2), ch3=+0x00C (SEN_AIN5/A3).
      # Sample format: MSB-aligned 16-bit word, 10-bit ADC result in bits[15:6].
      # DATA field is defined right-justified (bitOffset=6, bitWidth=10) so
      # .data().bits() returns the 10-bit value directly (0..=1023).
      # -----------------------------------------------------------------------
      LPADC_FIFO[%s]:
        description: "LPADC ch%s FIFO Read Port — dequeue one 10-bit sample
                      (MSB-aligned in 16-bit word; DATA = bits[15:6] as 0..=1023)"
        dim: 4
        dimIncrement: 0x4
        addressOffset: 0x000
        access: read-only
        resetValue: 0x00000000
        fields:
          DATA:
            description: "10-bit ADC result, right-justified (raw bits[15:6] of
                          MSB-aligned word; multiply by VDDA_LPADC/1023 for volts)"
            bitOffset: 6
            bitWidth: 10
      # -----------------------------------------------------------------------
      # HPADC FIFO Read Ports (placeholder; HPADC driver is a follow-up).
      # ch0=+0x080 (SEN_AIN0/A4), ch1=+0x084 (SEN_AIN1/A5).
      # -----------------------------------------------------------------------
      HPADC_FIFO[%s]:
        description: "HPADC ch%s FIFO Read Port (SEN_AIN0/1, Arduino A4/A5)"
        dim: 2
        dimIncrement: 0x4
        addressOffset: 0x080
        access: read-only
        resetValue: 0x00000000
        fields:
          DATA:
            description: "10-bit HPADC sample, right-justified"
            bitOffset: 6
            bitWidth: 10
      # -----------------------------------------------------------------------
      # LPADC control registers (UM Tables ADC-106 through ADC-111)
      # -----------------------------------------------------------------------
      LPADC_A0:
        description: "LPADC Enable Control — LV_ADC_EN (UM Table ADC-106)"
        addressOffset: 0x200
        access: read-write
        resetValue: 0x00000000
        fields:
          LV_ADC_EN:
            description: "LPADC enable: 0=standby, 1=active"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Standby
