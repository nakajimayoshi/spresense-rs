  # TIMER0/TIMER1: ARM PrimeCell SP804 dual-input timers.
  # Base: CXD56_TIMER_BASE = 0xE0043000 (TIMER0), +0x0020 (TIMER1).
  # Source: nuttx/arch/arm/src/cxd56xx/hardware/cxd56_timer.h
  # Interrupts = 97/98 (see convention header):
  #   NuttX CXD56_IRQ_TIMER0 = EXTINT+97 (irq.h:162), CXD56_IRQ_TIMER1 =
  #   EXTINT+98 (irq.h:163); Manual Table Interrupt-33 INT_CAUSE3[3:1] TIMER
  #   "Interrupt request from TIMER (APP)" = 96+1..3 (p.124). Bit 3 is TIMER2
  #   (irq.h:164, EXTINT+99), a third channel not modeled here.
  TIMER0:
    description: "ARM PrimeCell SP804 dual-input timer 0"
    baseAddress: 0xE0043000
    addressBlock:
      offset: 0x0
      size: 0x20
      usage: "registers"
    interrupts:
      TIMER0:
        description: "TIMER0 interrupt"
        value: 97
    registers:
      LOAD:
        description: "Counter reload value"
        addressOffset: 0x000
        access: read-write
        resetValue: 0x00000000
      VALUE:
        description: "Current counter value (read-only)"
        addressOffset: 0x004
        access: read-only
        resetValue: 0xFFFFFFFF
      CONTROL:
        description: "Timer mode, prescaler, and interrupt control"
        addressOffset: 0x008
        access: read-write
        resetValue: 0x00000020
        fields:
          ENABLE:
            description: "Timer enable"
            bitOffset: 7
            bitWidth: 1
            enumeratedValues:
              - name: Disabled
                description: ""
                value: 0
              - name: Enabled
                description: ""
                value: 1
          PERIODIC:
            description: "Counter mode"
            bitOffset: 6
            bitWidth: 1
            enumeratedValues:
              - name: FreeRun
                description: "Free-running mode"
                value: 0
              - name: Periodic
                description: "Periodic (reload on zero) mode"
                value: 1
          INTENABLE:
            description: "Interrupt enable"
            bitOffset: 5
            bitWidth: 1
            enumeratedValues:
              - name: Disabled
                description: ""
                value: 0
              - name: Enabled
                description: ""
                value: 1
          DIV:
            description: "Input clock prescaler"
            bitOffset: 2
            bitWidth: 2
            enumeratedValues:
              - name: Div1
                description: "Divide by 1"
                value: 0
              - name: Div16
                description: "Divide by 16"
                value: 1
              - name: Div256
                description: "Divide by 256"
                value: 2
          SIZE:
            description: "Counter width"
            bitOffset: 1
            bitWidth: 1
            enumeratedValues:
              - name: Bits16
                description: "16-bit counter"
                value: 0
              - name: Bits32
                description: "32-bit counter"
                value: 1
          MODE:
            description: "Reload behavior on zero"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Wrap
                description: "Wrapping (free-running after reload)"
                value: 0
              - name: OneShot
                description: "One-shot (stops after first zero)"
                value: 1
      INTCLR:
        description: "Interrupt clear (write any value to clear)"
        addressOffset: 0x00C
        access: write-only
        resetValue: 0x00000000
      RIS:
        description: "Raw interrupt status"
        addressOffset: 0x010
        access: read-only
        resetValue: 0x00000000
        fields:
          TIMER_INTERRUPT:
            description: "Raw interrupt (set when counter reaches zero)"
            bitOffset: 0
            bitWidth: 1
      MIS:
        description: "Masked interrupt status"
        addressOffset: 0x014
        access: read-only
        resetValue: 0x00000000
        fields:
          TIMER_INTERRUPT:
            description: "Masked interrupt (RIS AND INTENABLE)"
            bitOffset: 0
            bitWidth: 1
      BGLOAD:
        description: "Background load register (no immediate counter restart)"
        addressOffset: 0x018
        access: read-write
        resetValue: 0x00000000

  TIMER1:
    description: "ARM PrimeCell SP804 dual-input timer 1"
    baseAddress: 0xE0043020
    derivedFrom: TIMER0
    interrupts:
      TIMER1:
        description: "TIMER1 interrupt"
        value: 98

