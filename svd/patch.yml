              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          RF_IF:
            description: "RF IF block"
            bitOffset: 6
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          RF_ADC:
            description: "RF ADC"
            bitOffset: 7
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          RF_LO:
            description: "RF local oscillator"
            bitOffset: 8
