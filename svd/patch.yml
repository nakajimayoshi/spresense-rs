# Make RSR (offset 0x04) writable so the write side (ECR / error-clear) is
# accessible via the PAC. PL011 spec: read=RSR status, write=ECR clears errors.
# The existing ROE/RBE/RPE/RFE fields have None/Error enums; making the register
# read-write lets svd2rust emit safe variant setters (.roe().error() etc.)
# which the HAL uses to write 0xf (clear all four error stickies).
UART1:
  _modify:
    RSR:
      access: read-write
UART2:
  _modify:
    RSR:
      access: read-write

_add:
  # TOPREG: top-of-chip clock / PMU / oscillator / PLL controller.
  # Base: CXD56_SYS_MIRROR(0x04000000) + 0x00100000 = 0x04100000.
  # addressBlock covers clock / PMU / IOCELL / IOMD / GP_* registers (0x000–0x2174).
  # GP_* GPIO data registers (DIR/OUT/IN layout) live at 0x2000–0x2174 in this peripheral.
  # Source: nuttx/arch/arm/src/cxd56xx/hardware/cxd5602_topreg.h
  TOPREG:
    description: "Top-of-chip clock / PMU / oscillator / PLL controller"
    baseAddress: 0x04100000
    addressBlock:
      offset: 0x0
      size: 0x2200
      usage: "registers"
    registers:
      PWD_CTL:
        description: "Power-domain control (1 = powered on)"
        addressOffset: 0x000
        access: read-write
        resetValue: 0x00000000
        fields:
          SCU:
            description: "Sensor Control Unit domain"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          CORE:
            description: "Core domain"
            bitOffset: 4
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          SYSIOP:
            description: "SYSIOP domain"
            bitOffset: 5
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          SYSIOP_SUB:
            description: "SYSIOP sub-domain"
            bitOffset: 6
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP:
            description: "Application domain"
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP_DSP:
            description: "Application DSP domain"
            bitOffset: 9
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP_SUB:
            description: "Application sub-domain"
            bitOffset: 10
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          GNSS_ITP:
            description: "GNSS ITP domain"
            bitOffset: 12
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
