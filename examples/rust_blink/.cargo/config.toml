[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# `cargo run` builds the ELF and hands it to the flasher (build + package + flash).
# Requires: cargo install --path ../../tools/cargo-spresense-flash
runner = "cargo-spresense-flash spresense-flash"
rustflags = [
  "-C", "link-arg=-Tlink.x",
]

[build]
target = "thumbv7em-none-eabihf"  # adjust for your MCU