            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          LPADC:
            description: "Low-power ADC"
            bitOffset: 13
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
      ANA_EN_CTL:
        # Write-1-to-set / write-1-to-clear paired bits (ON_*_SET / OFF_*_CLR).
        # Access as a raw 32-bit value; use the HAL for typed set/clear helpers.
        description: "Analog enable control (paired set/clear bits — use raw write)"
        addressOffset: 0x008
        access: read-write
        resetValue: 0x00000000
      PWD_RESET0:
        description: "Per-domain power reset control"
        addressOffset: 0x060
        access: read-write
        resetValue: 0x00000000
      PWD_STAT:
        description: "Power-domain status (read-only mirror of PWD_CTL)"
        addressOffset: 0x200
        access: read-only
        resetValue: 0x00000000
        fields:
          SCU:
            description: "Sensor Control Unit domain powered on"
            bitOffset: 0
            bitWidth: 1
          CORE:
            description: "Core domain powered on"
            bitOffset: 4
            bitWidth: 1
          SYSIOP:
            description: "SYSIOP domain powered on"
            bitOffset: 5
            bitWidth: 1
          SYSIOP_SUB:
            description: "SYSIOP sub-domain powered on"
            bitOffset: 6
            bitWidth: 1
          APP:
            description: "Application domain powered on"
            bitOffset: 8
            bitWidth: 1
          APP_DSP:
            description: "Application DSP domain powered on"
            bitOffset: 9
            bitWidth: 1
          APP_SUB:
