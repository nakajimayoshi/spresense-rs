  # SCU APB sub-blocks (§3.9.3 Figure SCU-80): SPI@0xD000, I2C0@0xD400, I2C1@0xD800.
  # Each sub-block owns a 0x400 decode window; registers end at 0xFC (IC_COMP_TYPE).
  # Interrupt = 17 (see convention header): NuttX CXD56_IRQ_SCU_I2C0 = EXTINT+17
  #   (irq.h:82). Manual: APP controller Table Interrupt-33 INT_CAUSE0[19:16] "SCU"
  #   block, sub-bit 17 (p.123) — the 4-bit SCU field decomposes to SCU_SPI=16,
  #   SCU_I2C0=17, SCU_I2C1=18, SCU_3=19; the SCU's own §3.9.6 Table SCU-133 lists
  #   this as SCU INT1 = I2C0. NuttX offset and manual agree.
