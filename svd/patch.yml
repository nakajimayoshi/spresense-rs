_add:
  GPIO0:
    description: "GPIO Port 0 — GP_* output-enable/data registers"
    # SYS pins 1-49:  offset = (pin - 1) * 4  (0x000 .. 0x0C0)
    # APP pins 56-105: offset = (pin - 7) * 4  (0x0C4 .. 0x188)
    # CXD56_TOPREG_GP_I2C4_BCK = CXD56_SYS_MIRROR(0x04000000)
    #   + 0x00100000 + 0x2000 = 0x04102000
    baseAddress: 0x04102000
    addressBlock:
      offset: 0x0
      size: 0x200
      usage: "registers"
    registers:
      GP_I2C4_BCK:
        description: "GPIO SYS pin 1 — I2C4 clock / Arduino D14"
        addressOffset: 0x000
        access: read-write
        resetValue: 0x00010000
        fields:
          DIR:
            description: "Output enable, active-low (0 = drive output, 1 = high-Z input)"
            bitOffset: 16
            bitWidth: 1
            enumeratedValues:
              - name: Enable
                description: "Drive output"
                value: 0
              - name: Disable
                description: "High-impedance input"
                value: 1
          OUT:
            description: "Output data"
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1
          IN:
            description: "Sampled pin level (read)"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1
      PIN97:
        description: "GPIO APP pin 97 — I2S1_BCK / LED0 on Spresense main board"
        addressOffset: 0x168
        access: read-write
        resetValue: 0x00010000
        fields:
          DIR:
            description: "Output enable, active-low (0 = drive output, 1 = high-Z input)"
            bitOffset: 16
            bitWidth: 1
            enumeratedValues:
              - name: Enable
                description: "Drive output"
                value: 0
              - name: Disable
                description: "High-impedance input"
                value: 1
          OUT:
            description: "Output data"
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1
          IN:
            description: "Sampled pin level (read)"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1

  # TOPREG: top-of-chip clock / PMU / oscillator / PLL controller.
  # Base: CXD56_SYS_MIRROR(0x04000000) + 0x00100000 = 0x04100000.
  # addressBlock covers clock-relevant registers (0x000–0x730) only.
  # Pin-mux / GP_* registers start at 0x2000 and are in GPIO0 / future patches.
  # Source: nuttx/arch/arm/src/cxd56xx/hardware/cxd5602_topreg.h
  TOPREG:
    description: "Top-of-chip clock / PMU / oscillator / PLL controller"
    baseAddress: 0x04100000
    addressBlock:
      offset: 0x0
      size: 0x800
      usage: "registers"
    registers:
      PWD_CTL:
        description: "Power-domain control (1 = powered on)"
        addressOffset: 0x000
        access: read-write
        resetValue: 0x00000000
        fields:
          SCU:
            description: "Sensor Control Unit domain"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          CORE:
            description: "Core domain"
            bitOffset: 4
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          SYSIOP:
            description: "SYSIOP domain"
            bitOffset: 5
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          SYSIOP_SUB:
            description: "SYSIOP sub-domain"
            bitOffset: 6
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP:
            description: "Application domain"
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP_DSP:
            description: "Application DSP domain"
            bitOffset: 9
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP_SUB:
            description: "Application sub-domain"
            bitOffset: 10
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          GNSS_ITP:
            description: "GNSS ITP domain"
            bitOffset: 12
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          GNSS:
            description: "GNSS domain"
            bitOffset: 13
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          APP_AUDIO:
            description: "Application audio domain"
            bitOffset: 14
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
      ANA_PW_CTL:
        description: "Analog circuit power control (1 = powered on)"
        addressOffset: 0x004
        access: read-write
        resetValue: 0x00000000
        fields:
          RCOSC:
            description: "RC oscillator"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          XOSC:
            description: "Crystal oscillator"
            bitOffset: 1
            bitWidth: 1
            enumeratedValues:
              - name: PoweredDown
                description: ""
                value: 0
              - name: PoweredOn
                description: ""
                value: 1
          SYSPLL:
            description: "System PLL"
            bitOffset: 2
            bitWidth: 1
